{% extends "admin/base.html" %}
{% block title %}New Customer — Agentico Admin{% endblock %}
{% block content %}
<h3 class="mb-4">Create New Customer</h3>
<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Shop Name *</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
            <div class="mb-3"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control"></div>
            <hr>
            <div class="mb-3"><label class="form-label">Purchase Date</label><input type="date" name="purchase_date" class="form-control"></div>
            <div class="mb-3"><label class="form-label">Amount Paid ($)</label><input type="number" step="0.01" name="amount_paid" class="form-control"></div>
            <div class="mb-3"><label class="form-label">Payment Notes</label><textarea name="payment_notes" class="form-control" rows="2"></textarea></div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Create Customer</button>
            <a href="/admin/customers" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
