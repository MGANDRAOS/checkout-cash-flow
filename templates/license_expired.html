{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card border-danger">
            <div class="card-body py-5">
                <i class="bi bi-shield-x text-danger" style="font-size:3rem;"></i>
                <h3 class="mt-3 mb-3">License Expired</h3>
                <p class="text-muted mb-4">
                    Your reporting dashboard license has expired or been suspended.
                    Contact support to renew your license.
                </p>
                <div class="d-inline-block bg-light rounded px-4 py-3">
                    <i class="bi bi-telephone me-2"></i>
                    <strong>{{ support_contact }}</strong>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
