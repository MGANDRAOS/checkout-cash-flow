{% extends "base.html" %}
{% block content %}

<div class="pt-4">

    <!-- Page header -->
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <h4 class="mb-1" style="font-family:var(--font-heading);font-weight:700;color:var(--text);">Invoices</h4>
            <div style="color:var(--text-2);font-size:0.875rem;">
                Browse receipts and daily activity using BizDate (RCPT_DATE shifted by &minus;7 hours).
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="card mb-3">
        <div class="card-body py-3 px-3">
            <div class="d-flex flex-wrap gap-2 align-items-end">

                <div>
                    <label class="form-label mb-1" style="font-size:0.8rem;color:var(--text-2);">Start (BizDate)</label>
                    <input id="inv-start" type="date" class="form-control form-control-sm">
                </div>

                <div>
                    <label class="form-label mb-1" style="font-size:0.8rem;color:var(--text-2);">End (BizDate)</label>
                    <input id="inv-end" type="date" class="form-control form-control-sm">
                </div>

                <div>
                    <label class="form-label mb-1" style="font-size:0.8rem;color:var(--text-2);">Search</label>
                    <input id="inv-search" type="text" class="form-control form-control-sm" placeholder="Receipt ID or item title/code" style="min-width:200px;">
                </div>

                <div>
                    <label class="form-label mb-1" style="font-size:0.8rem;color:var(--text-2);">Item code</label>
                    <input id="inv-item-code" type="text" class="form-control form-control-sm" placeholder="e.g. 490"
                        value="{{ prefill_item_code or '' }}">
                </div>

                <div>
                    <label class="form-label mb-1" style="font-size:0.8rem;color:var(--text-2);">Min</label>
                    <input id="inv-min" type="number" step="0.01" class="form-control form-control-sm" placeholder="0" style="width:90px;">
                </div>

                <div>
                    <label class="form-label mb-1" style="font-size:0.8rem;color:var(--text-2);">Max</label>
                    <input id="inv-max" type="number" step="0.01" class="form-control form-control-sm" placeholder="999999" style="width:90px;">
                </div>

                <div>
                    <button id="inv-run" class="btn btn-primary btn-sm">Apply</button>
                </div>

            </div>

            <div class="mt-2" id="inv-status" style="font-size:0.8rem;color:var(--text-3);"></div>
        </div>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-invoices" type="button" role="tab">
                Invoices
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-daily" type="button" role="tab">
                Daily Items
            </button>
        </li>
    </ul>

    <div class="tab-content border border-top-0 rounded-bottom p-2" style="background:var(--bg-surface);">

        <!-- TAB 1: INVOICES -->
        <div class="tab-pane fade show active" id="tab-invoices" role="tabpanel">
            <div class="d-flex justify-content-between align-items-center px-2 pt-2 mb-2">
                <div id="inv-count" style="font-size:0.8rem;color:var(--text-3);"></div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="invoices-table">
                    <thead style="font-size:0.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);">
                        <tr>
                            <th style="width:120px;">Receipt</th>
                            <th style="width:160px;">BizDate</th>
                            <th style="width:180px;">Receipt Time</th>
                            <th class="text-end" style="width:140px;">Amount</th>
                            <th class="text-end" style="width:120px;">Lines</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- TAB 2: DAILY ITEMS -->
        <div class="tab-pane fade" id="tab-daily" role="tabpanel">
            <div class="d-flex justify-content-between align-items-center px-2 pt-2 mb-2">
                <div id="daily-count" style="font-size:0.8rem;color:var(--text-3);"></div>
                <div style="font-size:0.8rem;color:var(--text-3);">Click a day to view items sold that day.</div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="daily-table">
                    <thead style="font-size:0.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);">
                        <tr>
                            <th style="width:140px;">BizDate</th>
                            <th class="text-end">Unique items</th>
                            <th class="text-end">Total qty</th>
                            <th class="text-end">Receipts</th>
                            <th class="text-end">Total sales</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

    </div>

</div>

<!-- Shared modal (used for invoice lines OR day items list) -->
<div class="modal fade" id="invoiceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <div class="fw-semibold" id="invoiceModalTitle">Details</div>
                    <div class="small" id="invoiceModalSub" style="color:var(--text-2);"></div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="invoiceModalBody"></div>
        </div>
    </div>
</div>

<script src="/static/js/invoices.js"></script>
<script>
    window.InvoicesModule.init();
</script>

{% endblock %}
