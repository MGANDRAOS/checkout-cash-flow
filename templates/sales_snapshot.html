{# templates/sales_snapshot.html #}
{% extends "base.html" %}

{% block content %}
<div id="salesSnapshotPage" class="py-4">

  <!-- ── Page Header ──────────────────────────────────────────── -->
  <div class="snap-header">
    <div class="snap-title-block">
      <h1>Sales Snapshot</h1>
      <p>Pick a range · choose daily or monthly · get the answer fast</p>
    </div>
    <div class="snap-quick-chips">
      <button class="snap-chip active" data-quick="yesterday">Yesterday</button>
      <button class="snap-chip" data-quick="last7">Last 7 Days</button>
      <button class="snap-chip" data-quick="thisMonth">This Month</button>
      <button class="snap-chip" data-quick="lastMonth">Last Month</button>
    </div>
  </div>

  <!-- ── Filter Strip ─────────────────────────────────────────── -->
  <div class="snap-filter-strip">

    <div class="snap-filter-group">
      <label for="fromDate">From</label>
      <input id="fromDate" type="date" />
    </div>

    <span class="snap-filter-arrow">→</span>

    <div class="snap-filter-group">
      <label for="toDate">To</label>
      <input id="toDate" type="date" />
    </div>

    <div class="snap-mode-toggle" role="group" aria-label="View mode">
      <input type="radio" name="mode" id="modeDaily" value="daily" autocomplete="off" checked>
      <label for="modeDaily">Daily</label>
      <input type="radio" name="mode" id="modeMonthly" value="monthly" autocomplete="off">
      <label for="modeMonthly">Monthly</label>
    </div>

  </div>

  <!-- ── KPI Hero ─────────────────────────────────────────────── -->
  <div class="snap-kpi-hero">
    <div class="snap-kpi-section-label">Total Sales</div>

    <div class="snap-kpi-row">
      <!-- LBP primary -->
      <div class="snap-kpi-block">
        <span id="totalSales" class="snap-kpi-number">—</span>
        <span class="snap-kpi-currency">LBP</span>
      </div>
      <!-- USD secondary -->
      <div class="snap-kpi-block">
        <span id="totalSalesUSD" class="snap-kpi-number secondary">—</span>
        <span class="snap-kpi-currency secondary">USD</span>
      </div>
    </div>

    <div id="kpiSubline" class="snap-kpi-subline">—</div>
  </div>

  <!-- ── Breakdown Card ───────────────────────────────────────── -->
  <div class="snap-breakdown-card">

    <div class="snap-breakdown-header">
      <div>
        <span class="snap-breakdown-title">Breakdown</span>
        <span id="breakdownHint" class="snap-breakdown-hint">—</span>
      </div>
      <button id="exportCsvBtn" class="snap-export-btn">
        <i class="bi bi-download"></i> Export CSV
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover snap-table align-middle mb-0">
        <thead>
          <tr>
            <th>Period</th>
            <th class="text-end">Sales</th>
          </tr>
        </thead>
        <tbody id="breakdownBody">
          <tr>
            <td colspan="2" class="snap-empty-state">Pick dates above to load sales.</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</div>

<script src="{{ url_for('static', filename='js/sales_snapshot.js') }}"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => SalesSnapshotModule.init());
</script>
{% endblock %}
